version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: road_safety_db
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       road_safety
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ML Service (Python FastAPI) ────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: road_safety_ml
    ports:
      - "8000:8000"
    environment:
      ML_PORT: 8000
    volumes:
      - ./ml-service/model:/app/model
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: road_safety_backend
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV:        production
      PORT:            4000
      DATABASE_URL:    postgresql://postgres:password@postgres:5432/road_safety
      ML_SERVICE_URL:  http://ml-service:8000
      WEATHER_API_KEY: ${WEATHER_API_KEY}
      FRONTEND_URL:    http://localhost:3000
    volumes:
      - ./backend/logs:/app/logs

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL:  http://localhost:4000/api
        REACT_APP_WS_URL:   http://localhost:4000
    container_name: road_safety_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
